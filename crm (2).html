<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Швейна CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0d0b; --surface: #1a1714; --card: #211e1a; --border: #2e2a25;
    --accent: #c8a96e; --accent-dim: #8a6e3e; --text: #e8e0d4; --muted: #7a7268;
    --danger: #e07060; --warn: #d4a855; --ok: #7ab87a; --sent: #5a8a9a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }

  header { padding: 20px 28px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; background: var(--surface); }
  header h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 600; color: var(--accent); }
  .sync-status { margin-left: auto; display: flex; align-items: center; gap: 7px; font-size: 0.75rem; color: var(--muted); }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  .sync-dot.ok { background: var(--ok); }
  .sync-dot.loading { background: var(--warn); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .toolbar { padding: 12px 28px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; background: var(--surface); border-bottom: 1px solid var(--border); }
  .tab-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 16px; border-radius: 20px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; transition: all 0.2s; }
  .tab-btn.active, .tab-btn:hover { border-color: var(--accent); color: var(--accent); }
  .sort-wrap { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .sort-label { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
  .sort-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 5px 13px; border-radius: 20px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; transition: all 0.2s; white-space: nowrap; }
  .sort-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,169,110,0.08); }
  .sort-btn:hover { border-color: var(--accent-dim); color: var(--text); }
  .add-btn { margin-left: auto; background: var(--accent); color: #0f0d0b; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 0.85rem; transition: opacity 0.2s; }
  .add-btn:hover { opacity: 0.85; }
  .deadline-badge { display: inline-block; font-size: 0.68rem; padding: 2px 8px; border-radius: 8px; background: rgba(212,168,85,0.15); color: var(--warn); border: 1px solid var(--warn); margin-left: 6px; vertical-align: middle; }

  .orders-grid { padding: 20px 28px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; transition: border-color 0.2s, transform 0.15s; }
  .card:hover { border-color: var(--accent-dim); transform: translateY(-1px); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .client-name { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 600; }
  .insta-handle { font-size: 0.75rem; margin-top: 2px; }
  .insta-link { color: var(--accent); text-decoration: none; }
  .insta-link:hover { text-decoration: underline; }
  .status-badge { font-size: 0.7rem; padding: 3px 10px; border-radius: 10px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500; white-space: nowrap; }
  .badge-sewing { background: rgba(200,169,110,0.15); color: var(--accent); border: 1px solid var(--accent-dim); }
  .badge-sent { background: rgba(90,138,154,0.15); color: var(--sent); border: 1px solid var(--sent); }

  .order-desc { font-size: 0.82rem; color: var(--muted); margin-bottom: 10px; line-height: 1.5; }
  .meta-row { display: flex; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
  .meta-item { font-size: 0.78rem; color: var(--muted); }
  .meta-item strong { color: var(--text); font-weight: 500; }

  .countdown { margin-top: 10px; padding: 9px 13px; border-radius: 8px; background: var(--surface); border-left: 3px solid var(--accent); }
  .countdown.urgent { border-left-color: var(--danger); }
  .countdown.warn { border-left-color: var(--warn); }
  .countdown-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
  .countdown-value { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 600; line-height: 1; }
  .countdown-value.urgent { color: var(--danger); }
  .countdown-value.warn { color: var(--warn); }
  .countdown-value.ok { color: var(--ok); }

  .card-actions { display: flex; gap: 7px; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .action-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 5px 11px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .action-btn.danger:hover { border-color: var(--danger); color: var(--danger); }
  .action-btn.send-btn:hover { border-color: var(--sent); color: var(--sent); }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 26px; width: 100%; max-width: 460px; max-height: 92vh; overflow-y: auto; }
  .modal h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 600; color: var(--accent); margin-bottom: 18px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.73rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }
  .field input, .field textarea, .field select { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 9px 13px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; transition: border-color 0.2s; outline: none; }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 70px; }
  .field select option { background: var(--surface); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
  .save-btn { flex: 1; background: var(--accent); color: #0f0d0b; border: none; padding: 11px; border-radius: 8px; cursor: pointer; font-weight: 500; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; transition: opacity 0.2s; }
  .save-btn:hover { opacity: 0.85; }
  .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .cancel-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 11px 18px; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; transition: all 0.2s; }
  .cancel-btn:hover { border-color: var(--text); color: var(--text); }

  .empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted); font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-style: italic; }
  .loading-screen { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted); font-size: 0.85rem; }
  .notes-text { font-size: 0.78rem; color: var(--muted); font-style: italic; margin-top: 6px; line-height: 1.4; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px 22px; border-radius: 20px; font-size: 0.82rem; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  @media (max-width: 600px) {
    .orders-grid { padding: 14px; }
    header, .toolbar { padding-left: 16px; padding-right: 16px; }
    .row2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>✂️ Швейна CRM</h1>
  <div class="sync-status">
    <div class="sync-dot loading" id="sync-dot"></div>
    <span id="sync-text">Завантаження...</span>
  </div>
</header>

<div class="toolbar">
  <button class="tab-btn active" onclick="setFilter('all')">Всі <span id="cnt-all"></span></button>
  <button class="tab-btn" onclick="setFilter('sewing')">В пошиві <span id="cnt-sewing"></span></button>
  <button class="tab-btn" onclick="setFilter('sent')">Відправлено <span id="cnt-sent"></span></button>
  <div class="sort-wrap">
    <span class="sort-label">Сортування:</span>
    <button class="sort-btn active" id="sort-urgency" onclick="setSort('urgency')">🔥 Терміновість</button>
    <button class="sort-btn" id="sort-date" onclick="setSort('date')">📅 Дата додавання</button>
  </div>
  <button class="add-btn" onclick="openModal()">+ Замовлення</button>
</div>

<div class="orders-grid" id="grid">
  <div class="loading-screen">Завантаження замовлень...</div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modal-title">Нове замовлення</h2>
    <div class="field">
      <label>Ім'я клієнта *</label>
      <input id="f-name" type="text" placeholder="Ім'я">
    </div>
    <div class="field">
      <label>Instagram</label>
      <input id="f-insta" type="text" placeholder="@username">
    </div>
    <div class="field">
      <label>Опис замовлення</label>
      <textarea id="f-desc" placeholder="Сукня, розмір M, тканина..."></textarea>
    </div>
    <div class="row2">
      <div class="field">
        <label>Сума (грн)</label>
        <input id="f-price" type="number" placeholder="0">
      </div>
      <div class="field">
        <label>Передоплата (грн)</label>
        <input id="f-prepay" type="number" placeholder="0">
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>Дата оформлення</label>
        <input id="f-date" type="date">
      </div>
      <div class="field">
        <label>Статус</label>
        <select id="f-status">
          <option value="sewing">В пошиві</option>
          <option value="sent">Відправлено</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Ручний дедлайн <span style="color:var(--muted);font-size:0.7rem;text-transform:none;letter-spacing:0">(якщо клієнт просить конкретну дату)</span></label>
      <input id="f-deadline" type="date">
    </div>
    <div class="field">
      <label>Нотатки</label>
      <textarea id="f-notes" placeholder="Додаткові деталі..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeModal()">Скасувати</button>
      <button class="save-btn" id="save-btn" onclick="saveOrder()">Зберегти</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// NOTE: Google Sheet headers must be: id|name|insta|desc|price|prepay|date|deadline|status|notes
const API = 'https://script.google.com/macros/s/AKfycbwyTDEKA3oiL7DZt-uy3ErXBRhKfLICqD53cYVloTLUs49rGA8Zvr02lAycFvkXsYc8kA/exec';
const WORK_DAYS = 10;
let orders = [], filter = 'all', sortMode = 'urgency', editId = null, isSaving = false;

function setSyncStatus(state, text) {
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-text').textContent = text;
}

function showToast(msg, dur = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

async function fetchOrders() {
  setSyncStatus('loading', 'Оновлення...');
  try {
    const res = await fetch(API + '?t=' + Date.now());
    orders = await res.json();
    setSyncStatus('ok', 'Синхронізовано');
    render();
  } catch(e) {
    setSyncStatus('error', 'Помилка з\'єднання');
  }
}

async function apiPost(body) {
  const res = await fetch(API, { method: 'POST', body: JSON.stringify(body) });
  return res.json();
}

function workingDaysPassed(dateStr) {
  const start = new Date(dateStr); start.setHours(0,0,0,0);
  const today = new Date(); today.setHours(0,0,0,0);
  let count = 0, d = new Date(start);
  while (d < today) {
    if (d.getDay() !== 0 && d.getDay() !== 6) count++;
    d.setDate(d.getDate() + 1);
  }
  return count;
}

function daysLeft(o) {
  // if manual deadline set — count calendar days to it
  if (o.deadline) {
    const dl = new Date(o.deadline); dl.setHours(0,0,0,0);
    const today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.round((dl - today) / 86400000);
    return diff;
  }
  return WORK_DAYS - workingDaysPassed(o.date);
}

function daysLeftWorking(o) {
  // for display: working days if auto, calendar days if manual
  return daysLeft(o);
}

function formatDate(str) {
  if (!str) return '—';
  return new Date(str).toLocaleDateString('uk-UA', { day:'2-digit', month:'2-digit', year:'numeric' });
}

function promiseDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  let added = 0;
  while (added < WORK_DAYS) { d.setDate(d.getDate()+1); if (d.getDay()!==0&&d.getDay()!==6) added++; }
  return d.toLocaleDateString('uk-UA', { day:'2-digit', month:'2-digit' });
}

function setSort(mode) {
  sortMode = mode;
  document.getElementById('sort-urgency').classList.toggle('active', mode==='urgency');
  document.getElementById('sort-date').classList.toggle('active', mode==='date');
  render();
}

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['all','sewing','sent'][i]===f));
  render();
}

function render() {
  const sewing = orders.filter(o=>o.status==='sewing');
  const sent = orders.filter(o=>o.status==='sent');
  document.getElementById('cnt-all').textContent = orders.length ? `(${orders.length})` : '';
  document.getElementById('cnt-sewing').textContent = sewing.length ? `(${sewing.length})` : '';
  document.getElementById('cnt-sent').textContent = sent.length ? `(${sent.length})` : '';

  let list = filter==='all' ? orders : orders.filter(o=>o.status===filter);
  list = [...list].sort((a,b)=>{
    if (a.status !== b.status) return a.status==='sewing'?-1:1;
    if (a.status==='sewing') {
      if (sortMode==='urgency') return daysLeft(a) - daysLeft(b);
      return new Date(a.date) - new Date(b.date);
    }
    return new Date(b.date)-new Date(a.date);
  });

  const grid = document.getElementById('grid');
  if (!list.length) { grid.innerHTML = '<div class="empty">Немає замовлень у цій категорії</div>'; return; }

  grid.innerHTML = list.map(o => {
    const isSewing = o.status==='sewing';
    const left = isSewing ? daysLeft(o) : null;
    const isManual = !!o.deadline;
    let cdClass='', valClass='', cdLabel='', cdVal='';

    if (isSewing) {
      if (left<=0) {
        cdClass='urgent'; valClass='urgent';
        cdLabel = left===0 ? 'ЗДАТИ СЬОГОДНІ' : 'ПРОСРОЧЕНО НА';
        cdVal = left===0 ? '⚠️ Сьогодні' : `${Math.abs(left)} дн.`;
      } else if (left<=2) { cdClass='urgent'; valClass='urgent'; cdLabel=isManual?'Днів до дедлайну (ручний)':'Залишилось робочих днів'; cdVal=left; }
      else if (left<=4) { cdClass='warn'; valClass='warn'; cdLabel=isManual?'Днів до дедлайну (ручний)':'Залишилось робочих днів'; cdVal=left; }
      else { cdClass=''; valClass='ok'; cdLabel=isManual?'Днів до дедлайну (ручний)':'Залишилось робочих днів'; cdVal=left; }
    }

    const instaUser = o.insta ? (o.insta.startsWith('@')?o.insta:'@'+o.insta) : '';
    const instaHtml = instaUser
      ? `<div class="insta-handle"><a class="insta-link" href="https://instagram.com/${instaUser.replace('@','')}" target="_blank">${instaUser}</a></div>`
      : '';
    const balance = (o.price&&o.prepay) ? Number(o.price)-Number(o.prepay) : null;

    return `<div class="card">
      <div class="card-top">
        <div><div class="client-name">${o.name}</div>${instaHtml}</div>
        <span class="status-badge ${isSewing?'badge-sewing':'badge-sent'}">${isSewing?'В пошиві':'Відправлено'}</span>
      </div>
      ${o.desc?`<div class="order-desc">${o.desc}</div>`:''}
      <div class="meta-row">
        ${o.price?`<div class="meta-item"><strong>${Number(o.price).toLocaleString('uk-UA')} ₴</strong> сума</div>`:''}
        ${o.prepay?`<div class="meta-item"><strong>${Number(o.prepay).toLocaleString('uk-UA')} ₴</strong> передоплата</div>`:''}
        ${balance!==null?`<div class="meta-item"><strong>${Number(balance).toLocaleString('uk-UA')} ₴</strong> залишок</div>`:''}
      </div>
      <div class="meta-row">
        ${o.date?`<div class="meta-item">📅 <strong>${formatDate(o.date)}</strong></div>`:''}
        ${isSewing&&o.deadline?`<div class="meta-item">🎯 дедлайн: <strong>${formatDate(o.deadline)}</strong><span class="deadline-badge">ручний</span></div>`:isSewing&&o.date?`<div class="meta-item">🏁 до <strong>${promiseDate(o.date)}</strong></div>`:''}
      </div>
      ${o.notes?`<div class="notes-text">💬 ${o.notes}</div>`:''}
      ${isSewing?`<div class="countdown ${cdClass}">
        <div class="countdown-label">${cdLabel}</div>
        <div class="countdown-value ${valClass}">${typeof cdVal==='number'?cdVal+' дн.':cdVal}</div>
      </div>`:''}
      <div class="card-actions">
        <button class="action-btn" onclick="openModal('${o.id}')">✏️ Редагувати</button>
        ${isSewing?`<button class="action-btn send-btn" onclick="markSent('${o.id}')">📦 Відправлено</button>`:''}
        <button class="action-btn danger" onclick="deleteOrder('${o.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function openModal(id) {
  editId = id || null;
  document.getElementById('modal-title').textContent = id ? 'Редагувати замовлення' : 'Нове замовлення';
  if (id) {
    const o = orders.find(x=>x.id===id);
    document.getElementById('f-name').value = o.name||'';
    document.getElementById('f-insta').value = o.insta||'';
    document.getElementById('f-desc').value = o.desc||'';
    document.getElementById('f-price').value = o.price||'';
    document.getElementById('f-prepay').value = o.prepay||'';
    document.getElementById('f-date').value = o.date||'';
    document.getElementById('f-deadline').value = o.deadline||'';
    document.getElementById('f-status').value = o.status||'sewing';
    document.getElementById('f-notes').value = o.notes||'';
  } else {
    ['f-name','f-insta','f-desc','f-price','f-prepay','f-notes','f-deadline'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('f-status').value = 'sewing';
  }
  document.getElementById('overlay').classList.add('show');
  setTimeout(()=>document.getElementById('f-name').focus(),100);
}

function closeModal() { document.getElementById('overlay').classList.remove('show'); editId=null; }

async function saveOrder() {
  if (isSaving) return;
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('⚠️ Введіть ім\'я клієнта'); return; }
  const order = {
    id: editId||Date.now().toString(), name,
    insta: document.getElementById('f-insta').value.trim(),
    desc: document.getElementById('f-desc').value.trim(),
    price: document.getElementById('f-price').value,
    prepay: document.getElementById('f-prepay').value,
    date: document.getElementById('f-date').value,
    deadline: document.getElementById('f-deadline').value,
    status: document.getElementById('f-status').value,
    notes: document.getElementById('f-notes').value.trim(),
  };
  isSaving=true;
  const btn=document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='Збереження...';
  setSyncStatus('loading','Збереження...');
  try {
    await apiPost({ action: editId?'update':'add', ...order });
    orders = editId ? orders.map(o=>o.id===editId?order:o) : [...orders, order];
    closeModal(); render();
    setSyncStatus('ok','Синхронізовано');
    showToast(editId?'✅ Збережено':'✅ Замовлення додано');
  } catch(e) {
    setSyncStatus('error','Помилка збереження');
    showToast('❌ Помилка. Перевір інтернет.');
  }
  isSaving=false; btn.disabled=false; btn.textContent='Зберегти';
}

async function markSent(id) {
  const o=orders.find(x=>x.id===id); if(!o) return;
  setSyncStatus('loading','Оновлення...');
  try {
    await apiPost({ action:'update', ...o, status:'sent' });
    orders=orders.map(x=>x.id===id?{...x,status:'sent'}:x);
    render(); setSyncStatus('ok','Синхронізовано'); showToast('📦 Статус оновлено');
  } catch(e) { setSyncStatus('error','Помилка'); showToast('❌ Помилка оновлення'); }
}

async function deleteOrder(id) {
  if (!confirm('Видалити це замовлення?')) return;
  setSyncStatus('loading','Видалення...');
  try {
    await apiPost({ action:'delete', id });
    orders=orders.filter(o=>o.id!==id);
    render(); setSyncStatus('ok','Синхронізовано'); showToast('🗑 Видалено');
  } catch(e) { setSyncStatus('error','Помилка'); showToast('❌ Помилка видалення'); }
}

document.getElementById('overlay').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

fetchOrders();
setInterval(fetchOrders, 30000);
</script>
</body>
